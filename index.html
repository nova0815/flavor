<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flavor Note">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Flavor Note</title>
<style>
  :root{
    --bg: #221a12;            /* espresso brown */
    --bg-elevated: #2b2118;
    --surface: #30251a;
    --surface-2: #3a2d20;
    --border: #5a4630;
    --border-soft: #453626;
    --text: #efe3cd;          /* cream */
    --muted: #c4ad8b;         /* tan */
    --muted-2: #8a755b;
    --gold: #b8905a;          /* LV brass gold */
    --gold-bright: #d6b078;
    --gold-soft: rgba(184,144,90,0.16);
    --purple: #7a5a34;
    --purple-bright: #c4a06a;
    --purple-soft: rgba(184,144,90,0.16);
    --wine: #6b4a26;          /* dark tan accent buttons */
    --wine-soft: rgba(107,74,38,0.25);
    --radius-card: 8px;
    --radius-pill: 999px;
    --font-display: 'Futura', 'Avenir Next', 'Century Gothic', 'Hiragino Sans', sans-serif;
    --font-body: 'Futura', 'Avenir Next', 'Century Gothic', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    --font-brush: 'Futura', 'Avenir Next', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(90% 50% at 50% -8%, rgba(184,144,90,0.14) 0%, rgba(184,144,90,0) 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow-x:hidden;
  }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  .greek-strip{ display:block; width:100%; }

  /* ---------- Header ---------- */
  .app-header{ padding: 22px 22px 0; text-align:center; position:relative; }
  .crest{ width:56px; height:56px; margin: 2px auto 10px; display:block; border-radius:14px; }
  .app-header .brand-jp{
    font-family: var(--font-display); font-weight:600; font-size:22px; letter-spacing:0.34em;
    color: var(--text); margin:0; text-transform:uppercase; padding-left:0.34em; line-height:1.2;
  }
  .app-header .brand-en{
    font-family: var(--font-body); font-size:9.5px; letter-spacing:0.48em; color: var(--gold);
    text-transform:uppercase; margin: 6px 0 14px; padding-left:0.48em; font-weight:600;
  }

  main{ flex:1; padding: 4px 18px calc(100px + var(--safe-bottom)); }
  .screen{ display:none; animation: fadein 0.22s ease; }
  .screen.active{ display:block; }
  @keyframes fadein{ from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }

  body.subpage .app-header, body.subpage .tabbar{ display:none; }
  main.subpage-main{ padding-top: 8px; }

  .page-topbar{ display:flex; align-items:center; gap:12px; padding: 18px 0 6px; }
  .back-btn{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background: var(--surface);
    color: var(--gold); display:flex; align-items:center; justify-content:center; flex:0 0 auto; cursor:pointer;
  }
  .page-topbar h2{ font-family: var(--font-display); font-size:19px; font-weight:700; color: var(--text); margin:0; letter-spacing:0.04em; }

  h2.section-title{
    font-family: var(--font-display); font-size:18px; font-weight:700; margin: 16px 0 4px; color: var(--text);
    letter-spacing:0.03em;
  }
  .en-tag{ display:block; font-size:9.5px; letter-spacing:0.28em; color: var(--gold); font-family:var(--font-body); text-transform:uppercase; margin-bottom:5px; font-weight:600; }
  .subtext{ color: var(--muted); font-size:12.5px; line-height:1.7; margin:0 0 14px; }

  /* ---------- Buttons ---------- */
  .btn{
    border:none; border-radius: var(--radius-pill); padding: 13px 18px; font-size:13.5px; font-weight:700;
    cursor:pointer; font-family:var(--font-body); display:inline-flex; align-items:center; justify-content:center; gap:8px;
    letter-spacing:0.06em; transition: transform 0.15s ease;
  }
  .btn:active{ transform: scale(0.96); }
  .btn-primary{ background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#221a0c; }
  .btn-ghost{ background: transparent; color: var(--muted); border:1px solid var(--border); }
  .btn-wine{ background: var(--wine); color: #f3dcd8; }
  .btn-block{ width:100%; }

  /* ---------- Cards ---------- */
  .card{ background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius-card); padding: 14px 16px; margin-bottom: 12px; }
  .card-framed{ border:1px solid var(--gold); position:relative; }
  .empty-state{ text-align:center; padding: 40px 20px; color: var(--muted); border: 1px solid var(--border-soft); border-radius: var(--radius-card); }
  .empty-state .glyph{ width:30px; height:30px; margin:0 auto 12px; color: var(--gold); opacity:0.75; }
  .empty-state p{ margin:4px 0; font-size:13px; line-height:1.7; }

  .chip-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; scrollbar-width:none; }
  .chip-row::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; padding:7px 14px; border-radius: var(--radius-pill); font-size:12px; font-weight:700; letter-spacing:0.02em; background: var(--surface); color: var(--muted); border:1px solid var(--border-soft); cursor:pointer; white-space:nowrap; }
  .chip.active{ background: var(--gold-soft); color: var(--gold-bright); border-color: var(--gold); }

  .search-bar{ display:flex; align-items:center; gap:8px; background: var(--surface); border:1px solid var(--border-soft); border-radius: var(--radius-pill); padding: 10px 16px; margin-bottom:12px; }
  .search-bar input{ border:none; background:transparent; outline:none; color:var(--text); font-size:14px; width:100%; font-family:var(--font-body); }
  .search-bar input::placeholder{ color: var(--muted-2); }
  .search-bar svg{ flex:0 0 auto; color:var(--muted-2); }

  .flavor-item{ display:flex; align-items:center; gap:12px; padding:13px 4px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .flavor-item:last-child{ border-bottom:none; }
  .flavor-item:active{ background: var(--gold-soft); }
  .cat-dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; box-shadow: 0 0 0 2px rgba(0,0,0,0.25) inset; }
  .flavor-main{ flex:1; min-width:0; }
  .flavor-name{ font-size:15px; font-weight:700; color:var(--text); font-family:var(--font-display); }
  .flavor-sub{ font-size:11.5px; color:var(--muted-2); margin-top:2px; letter-spacing:0.02em; }
  .stars{ letter-spacing:1px; color: var(--gold); font-size:12.5px; white-space:nowrap; }
  .stars.dim{ color: var(--muted-2); }
  .chevron{ color: var(--muted-2); flex:0 0 auto; }

  .combo-item{ padding: 14px 4px; border-bottom:1px solid var(--border-soft); }
  .combo-item:last-child{ border-bottom:none; }
  .combo-flavors{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
  .flavor-tag{ font-size:11.5px; font-weight:700; padding:4px 10px; border-radius: var(--radius-pill); background: var(--surface-2); color: var(--text); border:1px solid var(--border); }
  .combo-meta{ display:flex; justify-content:space-between; align-items:center; }
  .combo-date{ font-size:11px; color:var(--muted-2); letter-spacing:0.03em; }
  .combo-memo{ font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.7; }

  .suggest-card{ background: var(--surface); border:1px solid var(--gold); border-radius: var(--radius-card); padding:18px; margin-bottom:14px; position:relative; }
  .suggest-rank{ font-size:10px; letter-spacing:0.24em; color: var(--muted-2); text-transform:uppercase; margin-bottom:8px; }
  .suggest-pair{ display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .suggest-flavor{ font-family: var(--font-display); font-size:19px; font-weight:700; color: var(--gold-bright); }
  .plus-sign{ color: var(--muted-2); font-size:15px; }
  .suggest-reason{ font-size:13px; color: var(--muted); line-height:1.75; margin-bottom:12px; }
  .badge-new{ display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:0.04em; color: #f2e6c9; background: var(--wine); padding:3px 10px; border-radius: var(--radius-pill); margin-bottom:10px; }
  .badge-tried{ display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:0.04em; color: var(--muted); background: var(--surface-2); padding:3px 10px; border-radius: var(--radius-pill); margin-bottom:10px; }

  /* ---------- Tab bar ---------- */
  .tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px;
    background: rgba(34,26,18,0.94); backdrop-filter: blur(14px); border-top:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center; padding: 6px 26px calc(8px + var(--safe-bottom)); z-index:40;
  }
  .tab-group{ display:flex; align-items:center; gap:30px; }
  .tab-btn{ background:none; border:none; color: var(--muted-2); display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; font-family:var(--font-body); font-weight:700; letter-spacing:0.02em; padding:6px 4px; cursor:pointer; }
  .tab-btn.active{ color: var(--gold-bright); }
  .tab-btn svg{ width:21px; height:21px; }
  .tab-add-btn{
    position:absolute; left:50%; top:50%; transform: translate(-50%, -50%);
    width:52px; height:52px; border-radius:50%; background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    color:#221a0c; display:flex; align-items:center; justify-content:center; border: 4px solid var(--bg);
  }
  .tab-add-btn svg{ width:21px; height:21px; }

  /* ---------- Sheet / Modal ---------- */
  .sheet-backdrop{ position:fixed; inset:0; background: rgba(6,5,4,0.62); z-index:60; opacity:0; pointer-events:none; transition: opacity 0.2s ease; }
  .sheet-backdrop.open{ opacity:1; pointer-events:auto; }
  .sheet{ position:fixed; left:50%; bottom:0; transform: translate(-50%, 100%); width:100%; max-width:480px; background: var(--bg-elevated); border-radius: 18px 18px 0 0; border-top:1px solid var(--gold); z-index:61; padding: 10px 20px calc(24px + var(--safe-bottom)); max-height: 86vh; overflow-y:auto; transition: transform 0.28s cubic-bezier(.32,.72,0,1); }
  .sheet.open{ transform: translate(-50%, 0); }
  .sheet-handle{ width:36px; height:3px; background: var(--border); border-radius:99px; margin: 6px auto 14px; }
  .sheet h3{ font-family: var(--font-display); font-size:19px; margin: 0 0 4px; letter-spacing:0.03em; }
  .sheet .subtext{ margin-bottom:16px; }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:11.5px; font-weight:700; color: var(--muted); margin-bottom:7px; letter-spacing:0.06em; text-transform:uppercase; }
  .field label .en{ display:block; font-size:9.5px; letter-spacing:0.24em; color: var(--gold); margin-bottom:3px; }
  .field input[type=text], .field textarea, .field select{ width:100%; background: var(--surface); border:1px solid var(--border-soft); border-radius: var(--radius-card); padding:11px 13px; color: var(--text); font-size:14.5px; font-family:var(--font-body); outline:none; }
  .field input[type=text]:focus, .field textarea:focus{ border-color: var(--gold); }
  .field textarea{ resize:vertical; min-height:64px; }
  .cat-select{ display:flex; flex-wrap:wrap; gap:8px; }
  .cat-option{ padding:8px 13px; border-radius: var(--radius-pill); font-size:12.5px; font-weight:700; border:1px solid var(--border-soft); background: var(--surface); color: var(--muted); cursor:pointer; }
  .cat-option.active{ color:#1a1410; border-color: transparent; }
  .star-input{ font-size:26px; letter-spacing:5px; cursor:pointer; color: var(--muted-2); }
  .star-input span.on{ color: var(--gold); }
  .flavor-pick-list{ max-height:220px; overflow-y:auto; border:1px solid var(--border-soft); border-radius: var(--radius-card); }
  .flavor-pick-row{ display:flex; align-items:center; gap:10px; padding:11px 13px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .flavor-pick-row:last-child{ border-bottom:none; }
  .flavor-pick-row.selected{ background: var(--gold-soft); }
  .checkbox{ width:17px; height:17px; border-radius:4px; border:1.5px solid var(--muted-2); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:11px; }
  .flavor-pick-row.selected .checkbox{ background: var(--gold); border-color: var(--gold); color:#1a1410; }
  .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
  .sheet-option-card{ display:flex; align-items:center; gap:14px; padding:16px; border-radius: var(--radius-card); background: var(--surface); border:1px solid var(--border-soft); margin-bottom:10px; cursor:pointer; }
  .sheet-option-card .icon-wrap{ width:40px; height:40px; border-radius:10px; background: var(--gold-soft); color: var(--gold); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .sheet-option-card strong{ display:block; font-size:14.5px; margin-bottom:2px; font-family:var(--font-display); }
  .sheet-option-card span{ font-size:12px; color: var(--muted); }

  .toast{ position:fixed; bottom: calc(96px + var(--safe-bottom)); left:50%; transform: translateX(-50%) translateY(10px); background: var(--surface-2); border:1px solid var(--gold); color: var(--text); padding:10px 18px; border-radius: var(--radius-pill); font-size:12.5px; z-index:80; opacity:0; pointer-events:none; transition: all 0.25s ease; }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  /* detail page */
  .detail-hero{ text-align:center; padding: 10px 0 18px; }
  .detail-hero .cat-badge{ display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius: var(--radius-pill); font-size:11px; font-weight:700; letter-spacing:0.05em; margin-bottom:10px; }
  .detail-hero h1{ font-family: var(--font-display); font-size:26px; margin: 4px 0; }
  .detail-hero .brand-line{ font-size:12.5px; color: var(--muted-2); letter-spacing:0.04em; }
  .detail-actions{ display:flex; gap:10px; margin: 14px 0 4px; }
  .stat-row{ display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom:1px solid var(--border-soft); font-size:13px; }
  .stat-row .label{ color: var(--muted); }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- monogram flower repeat: quatrefoil + diamond dots -->
    <pattern id="meander" width="36" height="12" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#b8905a" stroke-width="1.1">
        <path d="M9 3.2 C10.6 3.2 11 4.4 10 5.3 C11.4 5.2 12 6 12 6 C12 6 11.4 6.8 10 6.7 C11 7.6 10.6 8.8 9 8.8 C7.4 8.8 7 7.6 8 6.7 C6.6 6.8 6 6 6 6 C6 6 6.6 5.2 8 5.3 C7 4.4 7.4 3.2 9 3.2 Z"/>
      </g>
      <g fill="#b8905a">
        <path d="M27 3.4 L29.4 6 L27 8.6 L24.6 6 Z" opacity="0.85"/>
        <circle cx="27" cy="6" r="0.9" fill="#221a12"/>
      </g>
    </pattern>
  </defs>
</svg>

<div id="app">
  <div class="app-header">
    <img class="crest" src="apple-touch-icon.png" alt="Flavor Note">
    <p class="brand-jp">Flavor Note</p>
    <p class="brand-en">Shisha Journal</p>
    <svg class="greek-strip" viewBox="0 0 396 12" preserveAspectRatio="none" style="height:12px;"><rect width="396" height="12" fill="url(#meander)"/></svg>
  </div>

  <main id="main-area">
    <!-- HOME / RECOMMEND -->
    <section id="screen-home" class="screen active">
      <h2 class="section-title"><span class="en-tag">Today's pairing</span>今日のおすすめ組み合わせ</h2>
      <p class="subtext">登録したフレーバーの相性と好み度から、次に試したい組み合わせを提案します。</p>
      <div id="suggest-list"></div>
      <div id="suggest-actions" style="display:none; margin-top:6px;">
        <button class="btn btn-ghost btn-block" id="btn-more-suggest">別の組み合わせを見る</button>
      </div>
    </section>

    <!-- FLAVOR LIBRARY -->
    <section id="screen-flavors" class="screen">
      <h2 class="section-title"><span class="en-tag">Collection</span>フレーバー一覧</h2>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="flavor-search" placeholder="フレーバー名やブランドで検索">
      </div>
      <div class="chip-row" id="flavor-cat-chips"></div>
      <div id="flavor-list-wrap"></div>
    </section>

    <!-- LOG / COMBOS + SHOPS -->
    <section id="screen-log" class="screen">
      <h2 class="section-title"><span class="en-tag">Archive</span>記録</h2>
      <div class="chip-row" id="log-subtabs">
        <div class="chip active" data-sub="combo">組み合わせ</div>
        <div class="chip" data-sub="shop">お店</div>
      </div>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="log-search" placeholder="フレーバー名やメモで検索">
      </div>
      <div id="log-list-wrap"></div>
    </section>

    <!-- NEW / EDIT FLAVOR PAGE -->
    <section id="screen-flavor-form" class="screen">
      <div class="page-topbar">
        <button class="back-btn" id="ff-back" aria-label="戻る">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <span class="en-tag" id="ff-title-en" style="margin-bottom:2px;">NEW ENTRY</span>
          <h2 id="ff-title" style="margin:0;">新規フレーバー</h2>
        </div>
      </div>
      <svg class="greek-strip" viewBox="0 0 400 6" preserveAspectRatio="none" style="height:6px; margin-bottom:16px;"><rect width="400" height="6" fill="url(#meander)"/></svg>
      <p class="subtext">香りの系統と好み度をつけておくと、あとでおすすめの精度が上がります。</p>
      <div class="field"><label><span class="en">NAME</span>フレーバー名</label><input type="text" id="in-name" placeholder="例：ダブルアップル"></div>
      <div class="field"><label><span class="en">BRAND</span>ブランド（任意）</label><input type="text" id="in-brand" placeholder="例：Al Fakher"></div>
      <div class="field"><label><span class="en">TYPE</span>系統</label><div class="cat-select" id="cat-select"></div></div>
      <div class="field"><label><span class="en">NOTE</span>香りのノート（任意）</label><div class="cat-select" id="note-select"></div></div>
      <div class="field"><label><span class="en">RATING</span>好み度</label><div class="star-input" id="star-input"></div></div>
      <div class="field"><label><span class="en">MEMO</span>メモ（任意）</label><textarea id="in-memo" placeholder="香りの印象など"></textarea></div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" style="flex:1" id="ff-cancel">キャンセル</button>
        <button class="btn btn-primary" style="flex:2" id="ff-save">保存する</button>
      </div>
    </section>

    <!-- FLAVOR DETAIL / RECORD PAGE -->
    <section id="screen-flavor-detail" class="screen">
      <div class="page-topbar">
        <button class="back-btn" id="fd-back" aria-label="戻る">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <span class="en-tag" style="margin-bottom:2px;">DETAIL</span>
          <h2 style="margin:0;">フレーバー詳細</h2>
        </div>
      </div>
      <svg class="greek-strip" viewBox="0 0 400 6" preserveAspectRatio="none" style="height:6px; margin-bottom:6px;"><rect width="400" height="6" fill="url(#meander)"/></svg>
      <div id="fd-content"></div>
    </section>

    <!-- RANKING -->
    <section id="screen-ranking" class="screen">
      <h2 class="section-title"><span class="en-tag">Ranking</span>フレーバーランキング</h2>
      <p class="subtext">好み度・使用回数・系統の内訳から、あなたの傾向が見えてきます。</p>
      <div id="ranking-content"></div>
    </section>
  </main>

  <nav class="tabbar">
    <div class="tab-group">
      <button class="tab-btn active" data-tab="home">
        <svg viewBox="0 0 100 100" fill="none"><g fill="currentColor"><path d="M50 50 C43 43 44.5 24 50 19 C55.5 24 57 43 50 50 Z"/><path d="M50 50 C43 43 44.5 24 50 19 C55.5 24 57 43 50 50 Z" transform="rotate(90 50 50)"/><path d="M50 50 C43 43 44.5 24 50 19 C55.5 24 57 43 50 50 Z" transform="rotate(180 50 50)"/><path d="M50 50 C43 43 44.5 24 50 19 C55.5 24 57 43 50 50 Z" transform="rotate(270 50 50)"/><circle cx="50" cy="50" r="6"/></g></svg>
        おすすめ
      </button>
      <button class="tab-btn" data-tab="flavors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8v4a4 4 0 01-1.2 2.9L14 10v9a1 1 0 01-1 1h-2a1 1 0 01-1-1v-9l-.8-1.1A4 4 0 018 6V2z"/><line x1="8" y1="2" x2="16" y2="2"/></svg>
        フレーバー
      </button>
    </div>
    <button class="tab-add-btn" id="btn-open-add" aria-label="追加">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <div class="tab-group">
      <button class="tab-btn" data-tab="ranking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 20V12M12 20V4M18 20v-7"/></svg>
        ランキング
      </button>
      <button class="tab-btn" data-tab="log">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
        記録
      </button>
    </div>
  </nav>
</div>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const NOTE_TYPES = [
    {id:'top', label:'トップノート'},
    {id:'middle', label:'ミドルノート'},
    {id:'base', label:'ベースノート'}
  ];

  const CATEGORIES = [
    {id:'fruit', label:'フルーツ', color:'#b06a4a', trait:'爽やかな酸味と甘さ'},
    {id:'mint',  label:'ミント',   color:'#6f8f6f', trait:'すっきりとした清涼感'},
    {id:'sweet', label:'スイーツ', color:'#d6b078', trait:'濃厚で甘い余韻'},
    {id:'herb',  label:'ハーブ',   color:'#8f8a4f', trait:'奥行きのある香り'},
    {id:'spice', label:'スパイス', color:'#a05a2f', trait:'ピリッとした刺激'},
    {id:'drink', label:'ドリンク', color:'#8a6a4a', trait:'コクのある風味'},
    {id:'other', label:'その他',   color:'#9a8f7f', trait:'個性的な香り'}
  ];
  const catMap = Object.fromEntries(CATEGORIES.map(c=>[c.id,c]));

  const AFFINITY = {
    fruit: {fruit:3, mint:3, sweet:2, drink:2, herb:2, spice:1, other:1},
    mint:  {fruit:3, mint:1, sweet:2, herb:2, drink:1, spice:1, other:1},
    sweet: {fruit:2, mint:2, sweet:1, drink:2, herb:1, spice:2, other:1},
    herb:  {fruit:2, mint:2, sweet:1, herb:1, drink:1, spice:1, other:1},
    spice: {fruit:1, mint:1, sweet:2, herb:1, spice:1, drink:1, other:1},
    drink: {fruit:2, mint:1, sweet:2, herb:1, spice:1, drink:1, other:1},
    other: {fruit:1, mint:1, sweet:1, herb:1, spice:1, drink:1, other:1}
  };
  function affinity(a,b){ return (AFFINITY[a] && AFFINITY[a][b]) ?? 1; }
  function reasonFor(a,b){
    const ca = catMap[a.category], cb = catMap[b.category];
    if(a.category === b.category){
      return `${ca.label}同士の組み合わせ。${ca.trait}が重なり、統一感のある一服に。`;
    }
    return `${ca.label}の${ca.trait}と、${cb.label}の${cb.trait}が調和する組み合わせ。`;
  }

  const state = {
    flavors: [], combos: [], shops: [], activeCat: 'all', suggestOffset: 0, logSubTab: 'combo',
    pendingFlavorIds: [], editingFlavorId: null, detailFlavorId: null, previousTab: 'home'
  };

  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

  // ---------- storage (localStorage, so it works standalone once installed) ----------
  async function loadState(){
    try{ const f = localStorage.getItem('unen_flavors'); state.flavors = f ? JSON.parse(f) : []; }
    catch(e){ state.flavors = []; }
    try{ const c = localStorage.getItem('unen_combos'); state.combos = c ? JSON.parse(c) : []; }
    catch(e){ state.combos = []; }
    try{ const s = localStorage.getItem('unen_shops'); state.shops = s ? JSON.parse(s) : []; }
    catch(e){ state.shops = []; }
  }
  async function saveFlavors(){
    try{ localStorage.setItem('unen_flavors', JSON.stringify(state.flavors)); }
    catch(e){ showToast('保存に失敗しました'); }
  }
  async function saveCombos(){
    try{ localStorage.setItem('unen_combos', JSON.stringify(state.combos)); }
    catch(e){ showToast('保存に失敗しました'); }
  }
  async function saveShops(){
    try{ localStorage.setItem('unen_shops', JSON.stringify(state.shops)); }
    catch(e){ showToast('保存に失敗しました'); }
  }
  function getFlavor(id){ return state.flavors.find(f=>f.id===id); }

  // ---------- toast ----------
  let toastTimer;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  function starsHTML(rating, dim){
    const full = '★'.repeat(rating);
    const empty = '☆'.repeat(5-rating);
    return `<span class="stars ${dim?'dim':''}">${full}${empty}</span>`;
  }

  // ---------- navigation ----------
  const tabs = ['home','flavors','ranking','log'];
  const allScreens = ['home','flavors','ranking','log','flavor-form','flavor-detail'];
  function showScreen(name){
    allScreens.forEach(s=>{ document.getElementById('screen-'+s).classList.toggle('active', s===name); });
    document.querySelectorAll('.tab-btn').forEach(b=>{ b.classList.toggle('active', b.dataset.tab===name); });
    const isSub = (name==='flavor-form' || name==='flavor-detail');
    document.body.classList.toggle('subpage', isSub);
    document.getElementById('main-area').classList.toggle('subpage-main', isSub);
    if(name==='home') renderHome();
    if(name==='flavors') renderFlavorList();
    if(name==='log') renderLogList();
    if(name==='ranking') renderRanking();
  }
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ state.previousTab = b.dataset.tab; showScreen(b.dataset.tab); });
  });

  // ================= RENDER: HOME / SUGGESTIONS =================
  function computeSuggestions(){
    const flavors = state.flavors;
    if(flavors.length < 2) return [];
    const tried = new Set(state.combos.filter(c=>c.flavorIds.length===2).map(c=>c.flavorIds.slice().sort().join('|')));
    const pairs = [];
    for(let i=0;i<flavors.length;i++){
      for(let j=i+1;j<flavors.length;j++){
        const a = flavors[i], b = flavors[j];
        const key = [a.id,b.id].sort().join('|');
        const isTried = tried.has(key);
        const aff = affinity(a.category, b.category);
        const score = aff*3 + (a.rating + b.rating) - (isTried ? 50 : 0);
        pairs.push({a, b, score, tried:isTried});
      }
    }
    pairs.sort((x,y)=>y.score-x.score);
    return pairs;
  }

  function renderHome(){
    const list = computeSuggestions();
    const wrap = document.getElementById('suggest-list');
    const actions = document.getElementById('suggest-actions');
    if(state.flavors.length < 2){
      wrap.innerHTML = emptyState('フレーバーを2種類以上登録すると、<br>おすすめの組み合わせが表示されます。');
      actions.style.display = 'none';
      return;
    }
    const offset = state.suggestOffset % list.length;
    const shown = [];
    for(let k=0; k<3 && k<list.length; k++){ shown.push(list[(offset+k) % list.length]); }
    wrap.innerHTML = shown.map((p, idx)=>{
      const badge = p.tried ? '<span class="badge-tried">試したことがある組み合わせ</span>' : '<span class="badge-new">未体験の組み合わせ</span>';
      return `
      <div class="suggest-card">
        <div class="suggest-rank">No. ${idx+1}</div>
        ${badge}
        <div class="suggest-pair">
          <span class="suggest-flavor">${escapeHTML(p.a.name)}</span>
          <span class="plus-sign">×</span>
          <span class="suggest-flavor">${escapeHTML(p.b.name)}</span>
        </div>
        <p class="suggest-reason">${reasonFor(p.a,p.b)}</p>
        <button class="btn btn-wine btn-block btn-record-suggest" data-a="${p.a.id}" data-b="${p.b.id}">この組み合わせを記録する</button>
      </div>`;
    }).join('');
    actions.style.display = list.length > 3 ? 'block' : 'none';
    wrap.querySelectorAll('.btn-record-suggest').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.pendingFlavorIds = [btn.dataset.a, btn.dataset.b];
        openComboForm();
      });
    });
  }
  document.getElementById('btn-more-suggest').addEventListener('click', ()=>{ state.suggestOffset += 3; renderHome(); });

  function emptyState(msg, glyphPath){
    const path = glyphPath || 'M12 2C9 7 6 10 6 14a6 6 0 0012 0c0-1.5-.5-2.7-1.2-3.8.1 1.6-.7 2.6-1.6 2.6-1.3 0-1.4-1.4-1-2.6C13.6 8 12.8 5 12 2z';
    return `<div class="empty-state">
      <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="${path}"/></svg>
      <p>${msg}</p>
    </div>`;
  }

  // ================= RENDER: RANKING =================
  function renderRanking(){
    const wrap = document.getElementById('ranking-content');
    if(state.flavors.length===0){
      wrap.innerHTML = emptyState('まだフレーバーが登録されていません。<br>登録が増えると、ランキングが表示されます。');
      return;
    }
    const byRating = state.flavors.slice().sort((a,b)=> b.rating-a.rating || a.name.localeCompare(b.name,'ja')).slice(0,5);
    const usageCount = {};
    state.combos.forEach(c=> c.flavorIds.forEach(id=>{ usageCount[id] = (usageCount[id]||0) + 1; }));
    const byUsage = state.flavors.slice().filter(f=>usageCount[f.id]).sort((a,b)=>(usageCount[b.id]||0)-(usageCount[a.id]||0)).slice(0,5);
    const catCounts = {};
    state.flavors.forEach(f=>{ catCounts[f.category] = (catCounts[f.category]||0) + 1; });
    const maxCatCount = Math.max(1, ...Object.values(catCounts));

    const rankRow = (f, rightLabel, idx) => `
      <div class="flavor-item" data-id="${f.id}" style="cursor:pointer;">
        <span style="font-family:var(--font-display); font-weight:700; color:var(--gold); width:18px; flex:0 0 auto;">${idx+1}</span>
        <span class="cat-dot" style="background:${catMap[f.category].color}"></span>
        <div class="flavor-main">
          <div class="flavor-name">${escapeHTML(f.name)}</div>
          <div class="flavor-sub">${catMap[f.category].label}</div>
        </div>
        <span class="stars">${rightLabel}</span>
      </div>`;

    let html = `<h2 class="section-title" style="margin-top:4px;"><span class="en-tag">Favorites</span>好み度ランキング</h2>`;
    html += `<div class="card">${byRating.map((f,i)=>rankRow(f, '★'.repeat(f.rating), i)).join('')}</div>`;

    html += `<h2 class="section-title"><span class="en-tag">Most Used</span>使用回数ランキング</h2>`;
    html += byUsage.length===0
      ? emptyState('組み合わせを記録すると、使用回数ランキングが表示されます。')
      : `<div class="card">${byUsage.map((f,i)=>rankRow(f, `${usageCount[f.id]}回`, i)).join('')}</div>`;

    html += `<h2 class="section-title"><span class="en-tag">Breakdown</span>系統の内訳</h2>`;
    html += `<div class="card">${CATEGORIES.filter(c=>catCounts[c.id]).sort((a,b)=>(catCounts[b.id]||0)-(catCounts[a.id]||0)).map(c=>`
      <div class="stat-row" style="gap:10px;">
        <span class="label" style="display:flex; align-items:center; gap:8px; flex:1;">
          <span class="cat-dot" style="background:${c.color}"></span>${c.label}
          <span style="flex:1; height:5px; background:var(--surface-2); border-radius:99px; overflow:hidden; margin-left:6px;">
            <span style="display:block; height:100%; width:${(catCounts[c.id]/maxCatCount*100).toFixed(0)}%; background:${c.color};"></span>
          </span>
        </span>
        <span>${catCounts[c.id]}種</span>
      </div>`).join('')}</div>`;

    wrap.innerHTML = html;
    wrap.querySelectorAll('.flavor-item[data-id]').forEach(row=>{
      row.addEventListener('click', ()=> openFlavorDetail(row.dataset.id));
    });
  }

  // ================= RENDER: FLAVOR LIST =================
  function renderCatChips(){
    const wrap = document.getElementById('flavor-cat-chips');
    const chips = [{id:'all', label:'すべて'}, ...CATEGORIES];
    wrap.innerHTML = chips.map(c=>`<div class="chip ${state.activeCat===c.id?'active':''}" data-cat="${c.id}">${c.label}</div>`).join('');
    wrap.querySelectorAll('.chip').forEach(ch=>{
      ch.addEventListener('click', ()=>{ state.activeCat = ch.dataset.cat; renderFlavorList(); });
    });
  }
  function renderFlavorList(){
    renderCatChips();
    const q = (document.getElementById('flavor-search').value || '').trim().toLowerCase();
    let items = state.flavors.filter(f=>{
      const matchCat = state.activeCat==='all' || f.category===state.activeCat;
      const matchQ = !q || f.name.toLowerCase().includes(q) || (f.brand||'').toLowerCase().includes(q);
      return matchCat && matchQ;
    }).sort((a,b)=> b.rating - a.rating || a.name.localeCompare(b.name,'ja'));

    const wrap = document.getElementById('flavor-list-wrap');
    if(state.flavors.length===0){
      wrap.innerHTML = emptyState('まだフレーバーが登録されていません。<br>右下の「＋」から追加しましょう。', 'M8 2h8v4a4 4 0 01-1.2 2.9L14 10v9a1 1 0 01-1 1h-2a1 1 0 01-1-1v-9l-.8-1.1A4 4 0 018 6V2z');
      return;
    }
    if(items.length===0){
      wrap.innerHTML = emptyState('該当するフレーバーが見つかりません。', 'M11 3a8 8 0 100 16 8 8 0 000-16zM21 21l-4.35-4.35');
      return;
    }
    wrap.innerHTML = `<div class="card">${items.map(f=>`
      <div class="flavor-item" data-id="${f.id}">
        <span class="cat-dot" style="background:${catMap[f.category].color}"></span>
        <div class="flavor-main">
          <div class="flavor-name">${escapeHTML(f.name)}</div>
          <div class="flavor-sub">${escapeHTML(f.brand||catMap[f.category].label)}${f.brand ? ' ・ '+catMap[f.category].label : ''}</div>
        </div>
        ${starsHTML(f.rating)}
        <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
      </div>`).join('')}</div>`;
    wrap.querySelectorAll('.flavor-item').forEach(row=>{
      row.addEventListener('click', ()=> openFlavorDetail(row.dataset.id));
    });
  }
  document.getElementById('flavor-search').addEventListener('input', renderFlavorList);

  // ================= RENDER: LOG LIST (combos + shop visits) =================
  function renderLogSubtabs(){
    document.querySelectorAll('#log-subtabs .chip').forEach(ch=>{
      ch.classList.toggle('active', ch.dataset.sub === state.logSubTab);
    });
    document.getElementById('log-search').placeholder = state.logSubTab === 'shop'
      ? '店舗名・担当者・フレーバーで検索' : 'フレーバー名やメモで検索';
  }
  document.querySelectorAll('#log-subtabs .chip').forEach(ch=>{
    ch.addEventListener('click', ()=>{
      state.logSubTab = ch.dataset.sub;
      document.getElementById('log-search').value = '';
      renderLogList();
    });
  });

  function renderLogList(){
    renderLogSubtabs();
    if(state.logSubTab === 'shop'){ renderShopList(); return; }
    const q = (document.getElementById('log-search').value || '').trim().toLowerCase();
    let items = state.combos.filter(c=>{
      if(!q) return true;
      const names = c.flavorIds.map(id=>getFlavor(id)?.name || '').join(' ').toLowerCase();
      return names.includes(q) || (c.memo||'').toLowerCase().includes(q);
    }).sort((a,b)=> b.date.localeCompare(a.date));

    const wrap = document.getElementById('log-list-wrap');
    if(state.combos.length===0){
      wrap.innerHTML = emptyState('まだ記録がありません。<br>試した組み合わせを残しておきましょう。', 'M4 4h16v16H4zM8 9h8M8 13h8M8 17h4');
      return;
    }
    if(items.length===0){
      wrap.innerHTML = emptyState('該当する記録が見つかりません。', 'M11 3a8 8 0 100 16 8 8 0 000-16zM21 21l-4.35-4.35');
      return;
    }
    wrap.innerHTML = `<div class="card">${items.map(c=>{
      const flavors = c.flavorIds.map(id=>getFlavor(id)).filter(Boolean);
      return `
      <div class="combo-item">
        <div class="combo-flavors">${flavors.map(f=>`<span class="flavor-tag" style="border-color:${catMap[f.category].color}88">${escapeHTML(f.name)}${gramLabel(c,f.id)}</span>`).join('')}</div>
        <div class="combo-meta">${starsHTML(c.rating)}<span class="combo-date">${formatDate(c.date)}</span></div>
        ${comboSetupLine(c)}
        ${c.photo ? `<img src="${c.photo}" alt="アルミホイルの写真" style="width:100%; max-width:260px; border-radius:var(--radius-card); border:1px solid var(--border); margin-top:8px; display:block;">` : ''}
        ${c.memo ? `<div class="combo-memo">${escapeHTML(c.memo)}</div>` : ''}
      </div>`;
    }).join('')}</div>`;
  }

  function renderShopList(){
    const q = (document.getElementById('log-search').value || '').trim().toLowerCase();
    let items = state.shops.filter(s=>{
      if(!q) return true;
      const hay = [s.shopName, s.staffName, s.memo, ...(s.flavors||[])].join(' ').toLowerCase();
      return hay.includes(q);
    }).sort((a,b)=> b.date.localeCompare(a.date));

    const wrap = document.getElementById('log-list-wrap');
    if(state.shops.length===0){
      wrap.innerHTML = emptyState('まだお店の記録がありません。<br>行ったお店や頼んだフレーバーを残しておきましょう。', 'M3 9l1-5h16l1 5M4 9v10h16V9M4 9h16M10 13v6M14 13v6');
      return;
    }
    if(items.length===0){
      wrap.innerHTML = emptyState('該当する記録が見つかりません。', 'M11 3a8 8 0 100 16 8 8 0 000-16zM21 21l-4.35-4.35');
      return;
    }
    wrap.innerHTML = `<div class="card">${items.map(s=>`
      <div class="combo-item">
        <div class="combo-meta" style="margin-bottom:6px;">
          <span class="flavor-name" style="font-size:15px;">${escapeHTML(s.shopName)}</span>
          <span class="combo-date">${formatDate(s.date)}</span>
        </div>
        ${(s.staffName || s.price) ? `<div class="flavor-sub" style="margin-bottom:8px;">${s.staffName ? '担当: '+escapeHTML(s.staffName) : ''}${s.staffName && s.price ? ' ・ ' : ''}${s.price ? '¥'+Number(s.price).toLocaleString() : ''}</div>` : ''}
        ${(s.flavors && s.flavors.length) ? `<div class="combo-flavors">${s.flavors.map(fl=>`<span class="flavor-tag">${escapeHTML(fl)}</span>`).join('')}</div>` : ''}
        <div class="combo-meta" style="margin-top:6px;">${starsHTML(s.rating||0)}<span></span></div>
        ${s.memo ? `<div class="combo-memo">${escapeHTML(s.memo)}</div>` : ''}
        <button class="btn btn-ghost btn-shop-delete" data-id="${s.id}" style="margin-top:10px; padding:7px 14px; font-size:12px;">削除</button>
      </div>`).join('')}</div>`;
    wrap.querySelectorAll('.btn-shop-delete').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        if(!confirm('この記録を削除しますか？')) return;
        state.shops = state.shops.filter(s=>s.id!==btn.dataset.id);
        await saveShops();
        renderShopList();
      });
    });
  }
  document.getElementById('log-search').addEventListener('input', renderLogList);

  function comboSetupLine(combo){
    const parts = [];
    if(combo.charcoalCount) parts.push(`炭 ${combo.charcoalCount}個`);
    if(combo.steamMinutes) parts.push(`蒸らし ${combo.steamMinutes}分`);
    if(parts.length===0) return '';
    return `<div class="flavor-sub" style="margin-top:4px;">${parts.join(' ・ ')}</div>`;
  }

  function gramLabel(combo, flavorId){
    const g = combo.amounts && combo.amounts[flavorId];
    if(!g) return '';
    const pct = ((g / MIX_BASE_GRAMS) * 100).toFixed(0);
    return ` ${g}g (${pct}%)`;
  }

  function formatDate(iso){
    const d = new Date(iso);
    if(isNaN(d)) return iso;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ================= FLAVOR FORM PAGE (create / edit) =================
  const ffCatState = { chosenCat: 'fruit', chosenRating: 3, chosenNote: null };
  function openFlavorPage(editId){
    state.editingFlavorId = editId || null;
    const existing = editId ? getFlavor(editId) : null;
    ffCatState.chosenCat = existing ? existing.category : 'fruit';
    ffCatState.chosenRating = existing ? existing.rating : 3;
    ffCatState.chosenNote = existing ? (existing.note || null) : null;
    document.getElementById('ff-title').textContent = existing ? 'フレーバーを編集' : '新規フレーバー';
    document.getElementById('ff-title-en').textContent = existing ? 'EDIT ENTRY' : 'NEW ENTRY';
    document.getElementById('in-name').value = existing ? existing.name : '';
    document.getElementById('in-brand').value = existing ? (existing.brand||'') : '';
    document.getElementById('in-memo').value = existing ? (existing.memo||'') : '';
    drawFFCats();
    drawFFNotes();
    drawFFStars();
    showScreen('flavor-form');
  }
  function drawFFNotes(){
    const wrap = document.getElementById('note-select');

  const MIX_BASE_GRAMS = 12;

  function fileToResizedDataURL(file, maxDim=900, quality=0.72){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let { width, height } = img;
          if(width > maxDim || height > maxDim){
            if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
            else { width = Math.round(width * maxDim / height); height = maxDim; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

      if(!shopName){ showToast('店舗名を入力してください'); return; }
      const date = document.getElementById('shop-date').value.trim() || today;
      const staffName = document.getElementById('shop-staff').value.trim();
      const price = document.getElementById('shop-price').value.trim();
      const memo = document.getElementById('shop-memo').value.trim();
      state.shops.push({
        id: uid(), shopName, date, staffName, price: price ? Number(price.replace(/[^0-9.]/g,'')) : null,
        flavors: flavorsOrdered.slice(), rating, memo
      });
      await saveShops();
      closeSheet();
      showToast('お店の記録を残しました');
      state.logSubTab = 'shop';
      renderLogList();
    });
  }

  // ================= INIT =================
  async function init(){
    await loadState();
    renderHome();
    renderFlavorList();
    renderLogList();
  }
  init();
})();
</script>
</body>
</html>
